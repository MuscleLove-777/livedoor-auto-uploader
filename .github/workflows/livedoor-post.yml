name: Livedoor Blog Auto Post

on:
  schedule:
    # 7:00 JST = 22:00 UTC (前日)
    - cron: '0 22 * * *'
    # 12:30 JST = 03:30 UTC
    - cron: '30 3 * * *'
    # 19:30 JST = 10:30 UTC
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run upload
        env:
          LIVEDOOR_USER_ID: ${{ secrets.LIVEDOOR_USER_ID }}
          LIVEDOOR_API_KEY: ${{ secrets.LIVEDOOR_API_KEY }}
          LIVEDOOR_BLOG_NAME: ${{ secrets.LIVEDOOR_BLOG_NAME }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Commit uploaded.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded.json
          git diff --staged --quiet || git commit -m "Update uploaded.json [skip ci]"
          git push
